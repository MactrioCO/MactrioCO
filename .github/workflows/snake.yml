name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MactrioCO
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=ghost&color_dots=#6366f1,#818cf8,#a5b4fc,#c7d2fe,#e0e7ff,#6366f1,#818cf8

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
